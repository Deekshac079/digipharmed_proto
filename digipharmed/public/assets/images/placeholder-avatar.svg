<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f0f4f8"/>
  
  <!-- Gradient background for visual interest -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8ecf1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0dae8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bgGradient)"/>
  
  <!-- Head circle -->
  <circle cx="100" cy="70" r="35" fill="#9ca3af" opacity="0.6"/>
  
  <!-- Body/shoulders -->
  <ellipse cx="100" cy="160" rx="55" ry="50" fill="#9ca3af" opacity="0.5"/>
</svg>